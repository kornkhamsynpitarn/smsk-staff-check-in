<style>
  @import url('https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root{
    --ink-900:#101c2c;
    --ink-800:#182840;
    --ink-700:#233252;
    --brass-500:#c9a24b;
    --brass-400:#dbb968;
    --parchment-100:#ede6d3;
    --parchment-200:#d9d0b6;
    --success-500:#5aa06f;
    --exit-500:#b5573f;
    --line:rgba(237,230,211,0.14);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(201,162,75,0.10), transparent 60%),
      var(--ink-900);
    color:var(--parchment-100);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    padding:12px 14px 40px;
  }
  .wrap{max-width:560px;margin:0 auto;}

  .kiosk-screen{
    display:flex;
    flex-direction:column;
    padding:6px 0;
    box-sizing:border-box;
  }

  .lang-switch{display:flex;justify-content:center;gap:6px;margin-bottom:clamp(6px,1.2dvh,10px);flex:0 0 auto;}
  .lang-btn{
    background:transparent;border:1px solid var(--line);color:var(--parchment-200);
    font-family:'IBM Plex Mono', monospace;font-size:11px;letter-spacing:.05em;
    padding:4px 12px;border-radius:5px;cursor:pointer;opacity:.7;
  }
  .lang-btn.active{background:var(--brass-500);color:#1f1706;border-color:var(--brass-500);font-weight:600;opacity:1;}

  .brand-logo{
    display:block;margin:0 auto clamp(4px,1dvh,10px);
    height:clamp(40px,7dvh,72px);width:auto;
  }

  .letterhead{text-align:center;margin-bottom:clamp(6px,1.6dvh,16px);flex:0 0 auto;}
  .letterhead .eyebrow{
    font-family:'IBM Plex Mono', monospace;font-size:clamp(9px,1.3dvh,11px);letter-spacing:.18em;
    text-transform:uppercase;color:var(--brass-400);margin-bottom:clamp(3px,0.6dvh,6px);
  }
  .letterhead h1{
    font-family:'Spectral', serif;font-weight:600;font-size:clamp(18px,3.4dvh,26px);margin:0;
    color:var(--parchment-100);border-bottom:1px solid var(--line);padding-bottom:clamp(6px,1.2dvh,14px);
  }
  .clock{
    font-family:'IBM Plex Mono', monospace;font-size:clamp(20px,4.2dvh,34px);letter-spacing:.03em;
    color:var(--brass-400);margin-top:clamp(4px,1dvh,12px);font-variant-numeric:tabular-nums;
  }
  .date-line{
    font-family:'IBM Plex Mono', monospace;font-size:clamp(10px,1.5dvh,12px);color:var(--parchment-200);
    opacity:.7;margin-top:2px;
  }

  .card{background:var(--ink-800);border:1px solid var(--line);border-radius:10px;padding:22px;margin-bottom:18px;}
  .kiosk-card{
    display:flex;
    flex-direction:column;
    padding:clamp(12px,2.2dvh,22px);
    margin-bottom:0;
  }

  .conn-status{
    font-family:'IBM Plex Mono', monospace;font-size:clamp(9px,1.3dvh,11px);text-align:center;
    padding:clamp(5px,0.9dvh,8px);border-radius:6px;margin-bottom:clamp(6px,1.4dvh,18px);flex:0 0 auto;
  }
  .conn-status.ok{background:rgba(90,160,111,0.12);color:var(--success-500);}
  .conn-status.err{background:rgba(181,87,63,0.15);color:#e08a72;}
  .conn-status.loading{background:rgba(201,162,75,0.1);color:var(--brass-400);}

  .mode-toggle{display:flex;border:1px solid var(--line);border-radius:8px;overflow:hidden;margin-bottom:clamp(8px,1.6dvh,18px);flex:0 0 auto;}
  .mode-toggle button{
    flex:1;background:transparent;border:none;color:var(--parchment-200);
    font-family:'IBM Plex Mono', monospace;font-size:clamp(11px,1.6dvh,13px);letter-spacing:.06em;
    text-transform:uppercase;padding:clamp(8px,1.4dvh,12px) 8px;cursor:pointer;
    transition:background .15s ease, color .15s ease;
  }
  .mode-toggle button + button{border-left:1px solid var(--line);}
  .mode-toggle button.active.checkin{background:var(--success-500);color:#0d1a12;font-weight:600;}
  .mode-toggle button.active.checkout{background:var(--exit-500);color:#1f0d09;font-weight:600;}

  label{
    display:block;font-family:'IBM Plex Mono', monospace;font-size:clamp(9px,1.3dvh,11px);letter-spacing:.1em;
    text-transform:uppercase;color:var(--parchment-200);opacity:.75;margin-bottom:clamp(3px,0.7dvh,6px);flex:0 0 auto;
  }

  select, input[type=text]{
    width:100%;background:var(--ink-700);border:1px solid var(--line);color:var(--parchment-100);
    font-family:'IBM Plex Sans', sans-serif;font-size:clamp(13px,1.8dvh,15px);padding:clamp(8px,1.4dvh,12px) 12px;
    border-radius:6px;margin-bottom:clamp(8px,1.6dvh,16px);flex:0 0 auto;
  }
  select:focus, input:focus{outline:2px solid var(--brass-500); outline-offset:1px;}

  .last-action{
    font-family:'IBM Plex Mono', monospace;font-size:clamp(10px,1.4dvh,12px);color:var(--brass-400);
    opacity:.85;margin-top:clamp(-4px,-0.6dvh,-2px);margin-bottom:clamp(8px,1.6dvh,16px);flex:0 0 auto;
  }

  .manage-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;flex:0 0 auto;}
  .manage-row input{margin-bottom:0;flex:1;min-width:140px;}
  .small-btn{
    background:transparent;border:1px solid var(--brass-500);color:var(--brass-400);
    font-family:'IBM Plex Mono', monospace;font-size:12px;padding:0 14px;height:clamp(32px,5.5dvh,38px);
    border-radius:6px;cursor:pointer;white-space:nowrap;
  }
  .small-btn:hover{background:rgba(201,162,75,0.1);}
  .small-btn:disabled{opacity:.4;cursor:not-allowed;}
  .small-btn.danger{border-color:var(--exit-500);color:#e08a72;}

  .photo-row{
    display:flex;align-items:center;gap:10px;margin-bottom:clamp(8px,1.4dvh,16px);flex:0 0 auto;
  }
  .photo-thumb{
    width:clamp(48px,9dvh,64px);height:clamp(48px,9dvh,64px);border-radius:8px;object-fit:cover;
    border:1px solid var(--line);flex-shrink:0;
  }
  .camera-trigger-btn{
    flex:1;background:var(--ink-700);border:1px dashed var(--brass-500);color:var(--brass-400);
    font-family:'IBM Plex Mono', monospace;font-size:clamp(12px,1.7dvh,14px);letter-spacing:.04em;
    padding:clamp(12px,2dvh,16px) 12px;border-radius:8px;cursor:pointer;
  }
  .camera-trigger-btn:hover{background:rgba(201,162,75,0.08);}
  .camera-trigger-btn:disabled{opacity:.4;cursor:not-allowed;background:var(--ink-700);}

  .camera-modal{
    position:fixed;inset:0;background:#000;z-index:200;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
  }
  .camera-modal video, .camera-modal img{width:100%;height:100%;object-fit:cover;}
  .camera-modal .modal-msg{
    color:var(--parchment-100);font-family:'IBM Plex Mono', monospace;font-size:14px;
    text-align:center;padding:0 30px;line-height:1.5;
  }
  .modal-top-bar{position:absolute;top:0;left:0;right:0;display:flex;justify-content:flex-end;padding:16px;z-index:2;}
  .modal-cancel-btn{
    width:40px;height:40px;border-radius:50%;background:rgba(16,28,44,0.6);
    color:var(--parchment-100);border:1px solid rgba(237,230,211,0.3);font-size:18px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .modal-bottom-bar{
    position:absolute;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:center;
    padding:28px;z-index:2;
  }
  .modal-capture-btn{
    width:72px;height:72px;border-radius:50%;background:#fff;border:4px solid var(--brass-400);cursor:pointer;
  }
  .modal-live-tag{
    position:absolute;top:16px;left:16px;font-family:'IBM Plex Mono', monospace;font-size:10px;
    letter-spacing:.1em;background:var(--exit-500);color:#1f0d09;padding:3px 9px;border-radius:3px;z-index:2;
  }

  .review-modal{
    position:fixed;inset:0;background:rgba(16,28,44,0.92);z-index:220;
    display:flex;align-items:center;justify-content:center;padding:20px;
  }
  .review-card{
    background:var(--ink-800);border:1px solid var(--line);border-radius:14px;
    padding:28px 24px;max-width:360px;width:100%;text-align:center;
  }
  .review-mode-badge{
    display:inline-block;font-family:'IBM Plex Mono', monospace;font-size:11px;letter-spacing:.12em;
    text-transform:uppercase;padding:5px 14px;border-radius:20px;margin-bottom:18px;font-weight:600;
  }
  .review-mode-badge.checkin{background:rgba(90,160,111,0.18);color:var(--success-500);}
  .review-mode-badge.checkout{background:rgba(181,87,63,0.18);color:#e08a72;}
  .review-photo{
    width:150px;height:150px;border-radius:14px;object-fit:cover;border:2px solid var(--brass-500);
    margin-bottom:16px;
  }
  .review-name{
    font-family:'Spectral', serif;font-weight:700;font-size:22px;color:var(--parchment-100);
    margin-bottom:22px;word-break:break-word;
  }
  .review-buttons{display:flex;gap:10px;}
  .review-buttons .small-btn{flex:1;height:44px;}
  .review-buttons .confirm-btn{flex:1.4;margin:0;}

  .confirm-btn{
    width:100%;border:none;border-radius:8px;padding:clamp(11px,2dvh,15px);font-family:'IBM Plex Mono', monospace;
    font-size:clamp(12px,1.8dvh,14px);letter-spacing:.08em;text-transform:uppercase;font-weight:600;cursor:pointer;
    transition:transform .08s ease, opacity .15s ease;flex:0 0 auto;
  }
  .confirm-btn:active{transform:scale(0.98);}
  .confirm-btn:disabled{opacity:.4;cursor:not-allowed;}
  .confirm-btn.checkin{background:var(--success-500);color:#0d1a12;}
  .confirm-btn.checkout{background:var(--exit-500);color:#1f0d09;}

  .section-title{
    font-family:'Spectral', serif;font-size:16px;font-weight:600;color:var(--parchment-100);
    margin:0 0 14px;display:flex;justify-content:space-between;align-items:baseline;
  }
  .section-title span.count{font-family:'IBM Plex Mono', monospace;font-size:11px;color:var(--brass-400);opacity:.8;font-weight:400;}

  .ledger-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
  .ledger-row:last-child{border-bottom:none;}
  .stamp{
    width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono', monospace;font-size:10px;font-weight:600;letter-spacing:.02em;
    border:2px solid currentColor;flex-shrink:0;
  }
  .stamp.in{color:var(--success-500);}
  .stamp.out{color:var(--exit-500);}
  .ledger-thumb{width:34px;height:34px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--line);}
  .ledger-info{flex:1;min-width:0;}
  .ledger-name{font-size:14px;color:var(--parchment-100);}
  .ledger-meta{font-family:'IBM Plex Mono', monospace;font-size:11px;color:var(--parchment-200);opacity:.65;}
  .empty-state{text-align:center;padding:30px 10px;font-family:'IBM Plex Mono', monospace;font-size:12px;color:var(--parchment-200);opacity:.5;}

  .leave-row{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--line);}
  .leave-row:last-child{border-bottom:none;}
  .leave-dot{
    width:34px;height:34px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-family:'IBM Plex Mono', monospace;font-size:10px;font-weight:700;
    border:1px solid rgba(0,0,0,0.15);
  }
  .leave-name{font-size:14px;color:var(--parchment-100);flex:1;}
  .leave-type-pill{
    font-family:'IBM Plex Mono', monospace;font-size:11px;font-weight:600;
    padding:4px 10px;border-radius:12px;white-space:nowrap;
  }

  .staff-board-inline{
    display:flex;
    flex-direction:column;
    margin-top:clamp(10px,1.8dvh,18px);
    padding-top:clamp(8px,1.4dvh,14px);
    border-top:1px solid var(--line);
  }
  .staff-board-title{
    font-family:'Spectral', serif;font-weight:600;font-size:clamp(12px,1.7dvh,14px);
    color:var(--parchment-100);opacity:.85;margin-bottom:clamp(8px,1.2dvh,12px);flex:0 0 auto;
  }

  .staff-grid{
    display:grid;grid-template-columns:repeat(auto-fill, minmax(76px, 1fr));gap:16px;
  }
  .staff-cell{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .staff-photo{
    width:64px;height:64px;border-radius:50%;object-fit:cover;
    border:2px solid var(--success-500);
  }
  .staff-photo-placeholder{
    width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    border:2px dashed var(--line);color:var(--parchment-200);opacity:.45;
    font-family:'IBM Plex Mono', monospace;font-size:22px;font-weight:600;background:var(--ink-900);
  }
  .staff-leave-badge{
    width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    border:2px solid rgba(0,0,0,0.15);
    font-family:'IBM Plex Mono', monospace;font-size:13px;font-weight:700;letter-spacing:.02em;
    cursor:default;
  }
  .staff-name{
    font-family:'IBM Plex Sans', sans-serif;font-size:11px;color:var(--parchment-100);
    text-align:center;line-height:1.3;max-width:82px;overflow:hidden;text-overflow:ellipsis;
    white-space:nowrap;
  }

  .stamp-flash{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;z-index:50;}
  .stamp-flash.show{animation:stampIn 1.8s ease-out forwards;}
  .stamp-flash .ring{
    width:150px;height:150px;border-radius:50%;border:5px solid var(--brass-400);
    display:flex;align-items:center;justify-content:center;font-family:'Spectral', serif;
    font-weight:700;font-size:18px;letter-spacing:.05em;text-transform:uppercase;
    color:var(--brass-400);transform:rotate(-14deg);background:rgba(16,28,44,0.55);
  }
  @keyframes stampIn{
    0%{opacity:0; transform:scale(1.6);}
    15%{opacity:1; transform:scale(0.92);}
    22%{transform:scale(1.04);}
    30%{transform:scale(1);}
    80%{opacity:1; transform:scale(1);}
    100%{opacity:0; transform:scale(1);}
  }

  .footer-note{text-align:center;font-family:'IBM Plex Mono', monospace;font-size:10px;color:var(--parchment-200);opacity:.4;margin-top:22px;}

  @media (prefers-reduced-motion: reduce){ .stamp-flash.show{animation:none; opacity:0;} }
</style>
</head>

  // ---------- API helpers ----------
  async function apiGet(action){
    const res = await fetch(API_URL + '?action=' + encodeURIComponent(action));
    if(!res.ok) throw new Error('Request failed: ' + res.status);
    return res.json();
  }
  async function apiPost(payload){
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // avoids CORS preflight
      body: JSON.stringify(payload),
    });
    if(!res.ok) throw new Error('Request failed: ' + res.status);
    return res.json();
  }

  // ---------- Employees ----------
  function renderEmployeeSelect(){
    employeeSelect.innerHTML = '';
    if(state.employees.length === 0){
      const opt = document.createElement('option');
      opt.textContent = t('employeeNone');
      opt.disabled = true; opt.selected = true;
      employeeSelect.appendChild(opt);
      updateConfirmState();
      renderLastAction();
      renderStaffGrid();
      return;
    }
    state.employees.forEach(name => {
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      employeeSelect.appendChild(opt);
    });
    updateConfirmState();
    renderLastAction();
    renderStaffGrid();
  }

  function renderLastAction(){
    const name = employeeSelect.value;
    if(!name){ lastActionText.textContent = ''; return; }

    let latest = null;
    for(const r of state.records){
      if(r.employee !== name) continue;
      if(!latest || new Date(r.timestamp) > new Date(latest.timestamp)) latest = r;
    }

    if(!latest){
      lastActionText.textContent = t('lastNone');
      return;
    }

    const d = new Date(latest.timestamp);
    const now = new Date();
    const isToday = d.toDateString() === now.toDateString();
    const action = latest.type === 'checkin' ? t('checkedInWord') : t('checkedOutWord');
    const time = d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const dateStr = d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    const template = isToday ? t('lastTemplateToday') : t('lastTemplateOther');
    lastActionText.textContent = template
      .replace('{action}', action)
      .replace('{time}', time)
      .replace('{date}', dateStr);
  }
  employeeSelect.addEventListener('change', renderLastAction);

  function isSameDay(iso, ref){
    return new Date(iso).toDateString() === ref.toDateString();
  }

  function leaveLabelFor(leave){
    const key = 'leave' + leave.code;
    const translated = T[LANG] && T[LANG][key];
    return translated || leave.label;
  }

  function contrastTextColor(hex){
    // Returns black or white depending on which reads better against the given hex background.
    const h = String(hex).replace('#', '');
    if(h.length !== 6) return '#1a1a1a';
    const r = parseInt(h.substr(0, 2), 16);
    const g = parseInt(h.substr(2, 2), 16);
    const b = parseInt(h.substr(4, 2), 16);
    // Perceived brightness (standard luminance weighting).
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    return brightness > 150 ? '#1a1a1a' : '#f5f2e8';
  }

  function renderStaffGrid(){
    const grid = el('staffGrid');
    if(!grid) return;
    if(state.employees.length === 0){
      grid.innerHTML = '<div class="empty-state">' + t('employeeNone') + '</div>';
      return;
    }
    const today = new Date();
    grid.innerHTML = '';
    state.employees.forEach(name => {
      let latestCheckin = null;
      for(const r of state.records){
        if(r.employee !== name || r.type !== 'checkin') continue;
        if(!isSameDay(r.timestamp, today)) continue;
        if(!latestCheckin || new Date(r.timestamp) > new Date(latestCheckin.timestamp)) latestCheckin = r;
      }

      const cell = document.createElement('div');
      cell.className = 'staff-cell';

      if(latestCheckin && latestCheckin.photoUrl){
        const img = document.createElement('img');
        img.className = 'staff-photo';
        img.src = latestCheckin.photoUrl;
        img.loading = 'lazy';
        img.alt = name;
        cell.appendChild(img);
      }else if(state.leaveToday[name]){
        const leave = state.leaveToday[name];
        const badge = document.createElement('div');
        badge.className = 'staff-leave-badge';
        badge.textContent = leave.code;
        badge.title = leaveLabelFor(leave);
        if(leave.color){
          badge.style.background = leave.color;
          badge.style.color = contrastTextColor(leave.color);
        }
        cell.appendChild(badge);
      }else{
        const ph = document.createElement('div');
        ph.className = 'staff-photo-placeholder';
        ph.textContent = '?';
        cell.appendChild(ph);
      }

      const label = document.createElement('div');
      label.className = 'staff-name';
      label.textContent = name;
      cell.appendChild(label);

      grid.appendChild(cell);
    });
  }

  function hasActionToday(name, type){
    const now = new Date();
    return state.records.some(r => r.employee === name && r.type === type && isSameDay(r.timestamp, now));
  }

  function updateConfirmState(){
    const hasEmployee = !!employeeSelect.value;
    const hasPhoto = !!state.capturedPhoto;
    const alreadyDone = hasEmployee && hasActionToday(employeeSelect.value, state.mode);

    confirmBtn.disabled = !(hasEmployee && hasPhoto && apiConfigured()) || alreadyDone;
    startCameraBtn.disabled = alreadyDone;
    retakeBtn.disabled = alreadyDone;

    if(alreadyDone){
      photoStatus.textContent = state.mode === 'checkin' ? t('alreadyCheckedIn') : t('alreadyCheckedOut');
      photoStatus.style.color = getComputedStyle(document.documentElement).getPropertyValue('--exit-500');
    }else{
      photoStatus.textContent = hasPhoto ? t('photoCaptured') : t('photoNotCaptured');
      photoStatus.style.color = hasPhoto
        ? getComputedStyle(document.documentElement).getPropertyValue('--success-500')
        : getComputedStyle(document.documentElement).getPropertyValue('--exit-500');
    }
  }
  employeeSelect.addEventListener('change', updateConfirmState);

  // ---------- Mode toggle ----------
  function setMode(mode){
    state.mode = mode;
    el('modeInBtn').classList.toggle('active', mode === 'checkin');
    el('modeOutBtn').classList.toggle('active', mode === 'checkout');
    confirmBtn.classList.toggle('checkin', mode === 'checkin');
    confirmBtn.classList.toggle('checkout', mode === 'checkout');
    confirmBtn.textContent = mode === 'checkin' ? t('confirmCheckIn') : t('confirmCheckOut');
    updateConfirmState();
  }
  el('modeInBtn').addEventListener('click', () => setMode('checkin'));
  el('modeOutBtn').addEventListener('click', () => setMode('checkout'));

  // ---------- Clock ----------
  function tickClock(){
    const now = new Date();
    el('clock').textContent = now.toLocaleTimeString([], {hour12:false});
    el('dateLine').textContent = now.toLocaleDateString([], {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  }
  tickClock(); setInterval(tickClock, 1000);

  // ---------- Camera (full-screen modal) ----------
  let videoEl = null;
  let currentModalMsgKey = null;

  function closeModal(){
    if(state.stream){ state.stream.getTracks().forEach(t => t.stop()); state.stream = null; }
    cameraModal.style.display = 'none';
    modalBottomBar.style.display = 'none';
    cameraModalContent.innerHTML = '';
    videoEl = null;
    currentModalMsgKey = null;
  }

  function renderModalMessage(text){
    cameraModalContent.innerHTML = '<div class="modal-msg">' + text + '</div>';
  }

  async function openCamera(){
    cameraModal.style.display = 'flex';

    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
      currentModalMsgKey = 'cameraUnsupported';
      renderModalMessage(t('cameraUnsupported'));
      return;
    }
    try{
      currentModalMsgKey = 'cameraRequesting';
      renderModalMessage(t('cameraRequesting'));
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' }, audio: false });
      state.stream = stream;
      currentModalMsgKey = null;
      cameraModalContent.innerHTML = '';
      videoEl = document.createElement('video');
      videoEl.autoplay = true; videoEl.playsInline = true; videoEl.srcObject = stream;
      videoEl.style.transform = 'scaleX(-1)';
      videoEl.style.filter = 'brightness(1.08) contrast(1.04) saturate(1.08)';
      cameraModalContent.appendChild(videoEl);
      const liveTag = document.createElement('div');
      liveTag.className = 'modal-live-tag'; liveTag.textContent = 'LIVE';
      cameraModal.appendChild(liveTag);
      modalBottomBar.style.display = 'flex';
    }catch(e){
      currentModalMsgKey = 'cameraDenied';
      renderModalMessage(t('cameraDenied'));
    }
  }

  startCameraBtn.addEventListener('click', openCamera);
  retakeBtn.addEventListener('click', openCamera);

  modalCancelBtn.addEventListener('click', () => {
    const liveTag = cameraModal.querySelector('.modal-live-tag');
    if(liveTag) liveTag.remove();
    closeModal();
  });

  function captureBeautifiedPhoto(video){
    const w = video.videoWidth || 480;
    const h = video.videoHeight || 360;

    // Pass 1: mirror + auto brightness/contrast/clarity enhancement.
    const base = document.createElement('canvas');
    base.width = w; base.height = h;
    const bctx = base.getContext('2d');
    bctx.translate(w, 0);
    bctx.scale(-1, 1);
    bctx.filter = 'brightness(1.08) contrast(1.05) saturate(1.08)';
    bctx.drawImage(video, 0, 0, w, h);
    bctx.filter = 'none';
    bctx.setTransform(1, 0, 0, 1, 0, 0);

    // Pass 2: soft-focus blend for skin-smoothing (blurred copy at partial opacity
    // softens fine texture/blemishes while keeping edges and features recognizable).
    const soft = document.createElement('canvas');
    soft.width = w; soft.height = h;
    const sctx = soft.getContext('2d');
    sctx.filter = 'blur(3px)';
    sctx.drawImage(base, 0, 0);

    bctx.globalAlpha = 0.35;
    bctx.drawImage(soft, 0, 0);
    bctx.globalAlpha = 1;

    return base.toDataURL('image/jpeg', 0.85);
  }

  modalCaptureBtn.addEventListener('click', () => {
    if(!videoEl) return;
    state.capturedPhoto = captureBeautifiedPhoto(videoEl);

    const liveTag = cameraModal.querySelector('.modal-live-tag');
    if(liveTag) liveTag.remove();
    closeModal();

    photoThumb.src = state.capturedPhoto;
    photoThumb.style.display = 'block';
    startCameraBtn.style.display = 'none';
    retakeBtn.style.display = 'inline-block';
    updateConfirmState();
  });

  // ---------- Confirm check-in/out (review step first) ----------
  const reviewModal = el('reviewModal');
  const reviewModeBadge = el('reviewModeBadge');
  const reviewPhoto = el('reviewPhoto');
  const reviewName = el('reviewName');
  const reviewCancelBtn = el('reviewCancelBtn');
  const reviewConfirmBtn = el('reviewConfirmBtn');

  confirmBtn.addEventListener('click', () => {
    const name = employeeSelect.value;
    if(!name || !state.capturedPhoto) return;

    reviewName.textContent = name;
    reviewPhoto.src = state.capturedPhoto;
    reviewModeBadge.textContent = state.mode === 'checkin' ? t('reviewCheckingIn') : t('reviewCheckingOut');
    reviewModeBadge.classList.toggle('checkin', state.mode === 'checkin');
    reviewModeBadge.classList.toggle('checkout', state.mode === 'checkout');
    reviewConfirmBtn.classList.toggle('checkin', state.mode === 'checkin');
    reviewConfirmBtn.classList.toggle('checkout', state.mode === 'checkout');
    reviewConfirmBtn.textContent = state.mode === 'checkin' ? t('confirmCheckIn') : t('confirmCheckOut');
    reviewCancelBtn.textContent = t('cancel');
    reviewConfirmBtn.disabled = false;

    reviewModal.style.display = 'flex';
  });

  reviewCancelBtn.addEventListener('click', () => {
    reviewModal.style.display = 'none';
  });

  reviewConfirmBtn.addEventListener('click', async () => {
    const name = employeeSelect.value;
    if(!name || !state.capturedPhoto) { reviewModal.style.display = 'none'; return; }

    // Defense-in-depth: re-check for a same-day duplicate right before saving,
    // in case another device already recorded this action in the meantime.
    if(hasActionToday(name, state.mode)){
      reviewModal.style.display = 'none';
      updateConfirmState();
      alert(state.mode === 'checkin' ? t('alreadyCheckedIn') : t('alreadyCheckedOut'));
      return;
    }

    reviewConfirmBtn.disabled = true;
    reviewConfirmBtn.textContent = t('confirmSaving');

    try{
      await apiPost({ action: 'checkin', employee: name, type: state.mode, photoDataUrl: state.capturedPhoto });
      flashStamp(state.mode);
      await loadRecords();
    }catch(e){
      alert(t('saveFail'));
    }

    reviewModal.style.display = 'none';

    state.capturedPhoto = null;
    photoThumb.src = '';
    photoThumb.style.display = 'none';
    retakeBtn.style.display = 'none';
    startCameraBtn.style.display = 'inline-block';

    confirmBtn.textContent = state.mode === 'checkin' ? t('confirmCheckIn') : t('confirmCheckOut');
    updateConfirmState();
  });

  function flashStamp(mode){
    stampRing.textContent = mode === 'checkin' ? t('stampCheckedIn') : t('stampCheckedOut');
    const color = mode === 'checkin'
      ? getComputedStyle(document.documentElement).getPropertyValue('--success-500')
      : getComputedStyle(document.documentElement).getPropertyValue('--exit-500');
    stampRing.style.borderColor = color; stampRing.style.color = color;
    stampFlash.classList.remove('show');
    void stampFlash.offsetWidth;
    stampFlash.classList.add('show');
  }

  // ---------- History ----------
  function fmtTime(iso){
    const d = new Date(iso);
    return d.toLocaleString([], {month:'short', day:'numeric', hour:'2-digit', minute:'2-digit'});
  }

  function renderHistory(){
    const today = new Date();
    const todaysRecords = state.records.filter(r => isSameDay(r.timestamp, today));

    historyCount.textContent = todaysRecords.length + ' ' + t('logged');
    if(todaysRecords.length === 0){
      historyList.innerHTML = '<div class="empty-state">' + t('noEntries') + '</div>';
      return;
    }
    historyList.innerHTML = '';
    todaysRecords.forEach(r => {
      const row = document.createElement('div');
      row.className = 'ledger-row';
      if(r.photoUrl){
        const img = document.createElement('img');
        img.className = 'ledger-thumb'; img.src = r.photoUrl; img.loading = 'lazy';
        row.appendChild(img);
      }else{
        const stamp = document.createElement('div');
        stamp.className = 'stamp ' + (r.type === 'checkin' ? 'in' : 'out');
        stamp.textContent = r.type === 'checkin' ? 'IN' : 'OUT';
        row.appendChild(stamp);
      }
      const info = document.createElement('div');
      info.className = 'ledger-info';
      const nameDiv = document.createElement('div');
      nameDiv.className = 'ledger-name'; nameDiv.textContent = r.employee;
      const metaDiv = document.createElement('div');
      metaDiv.className = 'ledger-meta';
      metaDiv.textContent = (r.type === 'checkin' ? t('checkedInWord') : t('checkedOutWord')) + ' · ' + fmtTime(r.timestamp);
      info.appendChild(nameDiv); info.appendChild(metaDiv);
      row.appendChild(info);
      historyList.appendChild(row);
    });
  }

  el('refreshBtn').addEventListener('click', async () => {
    await loadEmployees();
    await loadRecords();
    await loadLeaveToday();
  });

  // ---------- Pay period (25th–24th cutoff) ----------
  const periodMonthInput = el('periodMonth');
  const periodLabel = el('periodLabel');

  function defaultPeriodEndMonth(){
    // If today is on/before the 24th, the active period ends THIS month's 24th.
    // If today is after the 24th, the active period ends NEXT month's 24th.
    const now = new Date();
    let y = now.getFullYear(), m = now.getMonth(); // 0-indexed
    if(now.getDate() > 24){
      m += 1;
      if(m > 11){ m = 0; y += 1; }
    }
    return y + '-' + String(m + 1).padStart(2, '0');
  }

  function getPeriodRange(){
    const val = periodMonthInput.value; // "YYYY-MM" = the END month (24th)
    const [y, m] = val.split('-').map(Number); // m is 1-indexed
    const end = new Date(y, m - 1, 24, 23, 59, 59, 999);
    const start = new Date(y, m - 2, 25, 0, 0, 0, 0); // JS normalizes month -1 automatically
    return { start, end };
  }

  function fmtShortDate(d){
    return d.toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function updatePeriodLabel(){
    const { start, end } = getPeriodRange();
    periodLabel.textContent = t('periodPrefix') + fmtShortDate(start) + ' – ' + fmtShortDate(end);
  }

  periodMonthInput.value = defaultPeriodEndMonth();
  periodMonthInput.addEventListener('change', updatePeriodLabel);
  updatePeriodLabel();

  // ---------- CSV Export ----------
  function downloadCSV(filename, rows){
    const csv = rows.map(row => row.map(cell => {
      const s = String(cell ?? '');
      return /[",\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
    }).join(',')).join('\r\n');
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  el('exportSummaryBtn').addEventListener('click', () => {
    const { start, end } = getPeriodRange();
    const periodRecords = state.records.filter(r => {
      const t = new Date(r.timestamp);
      return t >= start && t <= end;
    });
    if(periodRecords.length === 0){
      alert(t('alertNoExportPeriod') + ' (' + fmtShortDate(start) + ' – ' + fmtShortDate(end) + ').');
      return;
    }
    const groups = {};
    periodRecords.forEach(r => {
      const d = new Date(r.timestamp);
      const dateKey = d.toLocaleDateString('en-CA');
      const key = r.employee + '|' + dateKey;
      if(!groups[key]) groups[key] = { employee: r.employee, date: dateKey, checkIns: [], checkOuts: [] };
      if(r.type === 'checkin') groups[key].checkIns.push(d); else groups[key].checkOuts.push(d);
    });
    const rows = [['Employee', 'Date', 'First Check-in', 'Last Check-out', 'Hours Worked', 'Note']];
    Object.values(groups)
      .sort((a,b) => a.date === b.date ? a.employee.localeCompare(b.employee) : a.date.localeCompare(b.date))
      .forEach(g => {
        const firstIn = g.checkIns.length ? new Date(Math.min(...g.checkIns.map(d=>+d))) : null;
        const lastOut = g.checkOuts.length ? new Date(Math.max(...g.checkOuts.map(d=>+d))) : null;
        let hours = '', note = '';
        if(firstIn && lastOut && lastOut > firstIn) hours = ((lastOut - firstIn) / 3600000).toFixed(2);
        else if(firstIn && !lastOut) note = 'Missing check-out';
        else if(!firstIn && lastOut) note = 'Missing check-in';
        rows.push([g.employee, g.date,
          firstIn ? firstIn.toLocaleTimeString([], {hour12:false}) : '—',
          lastOut ? lastOut.toLocaleTimeString([], {hour12:false}) : '—', hours, note]);
      });
    const periodTag = start.toLocaleDateString('en-CA') + '_to_' + end.toLocaleDateString('en-CA');
    downloadCSV('Monthly-Summary-Report_' + periodTag + '.csv', rows);
  });

  // ---------- Language switching ----------
  const langButtons = document.querySelectorAll('.lang-btn');

  function applyLanguage(lang){
    LANG = lang;
    langButtons.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));

    el('eyebrowText').textContent = t('eyebrow');
    el('titleText').textContent = t('title');
    document.title = t('title');
    el('modeInBtn').textContent = t('modeCheckIn');
    el('modeOutBtn').textContent = t('modeCheckOut');
    el('employeeLabelText').textContent = t('employeeLabel');
    el('photoLabelText').textContent = t('photoLabel');
    el('startCameraBtn').textContent = '📷 ' + t('startCamera');
    el('retakeBtn').textContent = t('retake');
    el('recentEntriesText').textContent = t('recentEntries');
    el('staffBoardText').textContent = t('staffBoard');
    el('leaveTodayText').textContent = t('leaveTodayTitle');
    renderLeaveTodayList();
    el('otPeriodLabelText').textContent = t('otPeriodLabel');
    el('exportSummaryBtn').textContent = t('exportSummary');
    el('refreshBtn').textContent = t('refresh');
    el('footerNoteText').textContent = t('footerNote');

    // Re-render dynamic content that depends on language
    setMode(state.mode);
    renderEmployeeSelect();
    renderHistory();
    updatePeriodLabel();
    updateConfirmState();
    if(currentModalMsgKey) renderModalMessage(t(currentModalMsgKey));
    renderConnStatus();
  }

  langButtons.forEach(btn => {
    btn.addEventListener('click', () => applyLanguage(btn.dataset.lang));
  });

  // ---------- Loaders ----------
  async function loadEmployees(){
    try{
      state.employees = await apiGet('employees');
      renderEmployeeSelect();
    }catch(e){ /* leave prior state */ }
  }
  async function loadRecords(){
    try{
      state.records = await apiGet('records');
      renderHistory();
      renderLastAction();
      renderStaffGrid();
    }catch(e){ /* leave prior state */ }
  }
  function renderLeaveTodayList(){
    const card = el('leaveTodayCard');
    const list = el('leaveTodayList');
    const names = Object.keys(state.leaveToday);

    if(names.length === 0){
      card.style.display = 'none';
      return;
    }
    card.style.display = '';
    list.innerHTML = '';
    names.forEach(name => {
      const leave = state.leaveToday[name];
      const row = document.createElement('div');
      row.className = 'leave-row';

      const dot = document.createElement('div');
      dot.className = 'leave-dot';
      dot.textContent = leave.code;
      if(leave.color){
        dot.style.background = leave.color;
        dot.style.color = contrastTextColor(leave.color);
      }
      row.appendChild(dot);

      const nameEl = document.createElement('div');
      nameEl.className = 'leave-name';
      nameEl.textContent = name;
      row.appendChild(nameEl);

      const pill = document.createElement('div');
      pill.className = 'leave-type-pill';
      pill.textContent = leaveLabelFor(leave);
      if(leave.color){
        pill.style.background = leave.color;
        pill.style.color = contrastTextColor(leave.color);
      }
      row.appendChild(pill);

      list.appendChild(row);
    });
  }

  async function loadLeaveToday(){
    try{
      state.leaveToday = await apiGet('leaveToday');
      renderStaffGrid();
      renderLeaveTodayList();
    }catch(e){ /* leave prior state — badges just won't show if this fails */ }
  }

  function renderConnStatus(){
    connStatus.className = 'conn-status ' + (state.connState === 'ok' ? 'ok' : state.connState === 'err' ? 'err' : 'loading');
    if(state.connState === 'ok') connStatus.textContent = t('connOk');
    else if(state.connState === 'err') connStatus.textContent = t('connErr');
    else if(state.connState === 'notConfigured') connStatus.textContent = t('connNotConfigured');
    else connStatus.textContent = t('connConnecting');
  }

  // ---------- Init ----------
  (async function init(){
    applyLanguage(LANG);

    if(!apiConfigured()){
      state.connState = 'notConfigured';
      renderConnStatus();
      employeeSelect.innerHTML = '<option disabled selected>' + t('employeeSetupRequired') + '</option>';
      historyList.innerHTML = '<div class="empty-state">' + t('setupRequiredHistory') + '</div>';
      return;
    }
    try{
      await loadEmployees();
      await loadRecords();
      loadLeaveToday(); // fire-and-forget; not critical to initial render
      state.connState = 'ok';
      renderConnStatus();
    }catch(e){
      state.connState = 'err';
      renderConnStatus();
    }
  })();
})();
</script>
</body>
